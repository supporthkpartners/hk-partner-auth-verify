<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>HK Partner Group – Verification Portal</title>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <style>  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;  
        }

        body {  
            background: linear-gradient(135deg, #1a237e, #0d47a1);  
            color: #fff;  
            min-height: 100vh;  
            display: flex;  
            flex-direction: column;  
            align-items: center;  
            justify-content: center;  
            padding: 15px;  
        }

        .container {  
            background: rgba(255, 255, 255, 0.95);  
            color: #333;  
            width: 100%;  
            max-width: 500px;  
            border-radius: 15px;  
            padding: 20px;  
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);  
            margin-bottom: 20px;  
        }

        .header {  
            display: flex;  
            align-items: center;  
            justify-content: space-between;  
            border-bottom: 2px solid #0d47a1;  
            padding-bottom: 10px;  
            margin-bottom: 15px;  
            flex-wrap: wrap;  
        }

        .logo {  
            font-size: 22px;  
            font-weight: bold;  
            color: #0d47a1;  
            display: flex;  
            align-items: center;  
        }

        .logo i {  
            margin-right: 8px;  
        }

        .secure-badge {  
            background: #4CAF50;  
            color: white;  
            padding: 6px 12px;  
            border-radius: 12px;  
            font-size: 12px;  
            display: inline-flex;  
            align-items: center;  
        }

        .secure-badge i {  
            margin-right: 5px;  
        }

        h1 {  
            font-size: 18px;  
            margin-bottom: 8px;  
            color: #1a237e;  
            text-align: center;  
        }

        .description {  
            font-size: 14px;  
            line-height: 1.5;  
            margin-bottom: 15px;  
            color: #555;  
            text-align: center;  
        }

        form {  
            display: flex;  
            flex-direction: column;  
            gap: 15px;  
        }

        .form-group {  
            display: flex;  
            flex-direction: column;  
        }

        label {  
            font-weight: bold;  
            margin-bottom: 5px;  
            color: #0d47a1;  
            font-size: 14px;  
        }

        input, select {  
            padding: 12px;  
            border-radius: 8px;  
            border: 1px solid #ccc;  
            font-size: 16px;  
            transition: 0.3s;  
            width: 100%;  
        }

        input:focus, select:focus {  
            border-color: #0d47a1;  
            box-shadow: 0 0 5px rgba(13, 71, 161, 0.5);  
            outline: none;  
        }

        .ssn-section, .helloc-section {  
            background: #f5f5f5;  
            padding: 15px;  
            border-radius: 10px;  
            margin-top: 15px;  
        }

        .section-title {  
            font-size: 16px;  
            color: #1a237e;  
            margin-bottom: 10px;  
            display: flex;  
            align-items: center;  
        }

        .section-title i {  
            margin-right: 8px;  
            color: #4CAF50;  
        }

            background: linear-gradient(to right, #0d47a1, #1a237e);
